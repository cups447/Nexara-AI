services:
  - type: web
    name: nexara-ai
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: oregon
    plan: starter
    branch: main
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: BINANCE_API_KEY
        sync: false
      - key: BINANCE_API_SECRET
        sync: false
      - key: BINANCE_TESTNET
        value: "false"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHANNEL_ID
        sync: false
      - key: TELEGRAM_ADMIN_IDS
        sync: false
      - key: DATABASE_URL
        value: "sqlite:///./nexara.db"
      - key: DATABASE_ECHO
        value: "false"
      - key: SCAN_INTERVAL_SECONDS
        value: "30"
      - key: MIN_VOLUME_USDT
        value: "1000000"
      - key: MIN_CONFIDENCE_SCORE
        value: "90"
      - key: MAX_PAIRS_TO_SCAN
        value: "200"
      - key: SIGNAL_COOLDOWN_MINUTES
        value: "60"
      - key: MAX_SIGNALS_PER_HOUR
        value: "10"
      - key: DEFAULT_RISK_PERCENT
        value: "1.0"
      - key: DEFAULT_LEVERAGE
        value: "10"
      - key: MAX_RISK_PER_TRADE
        value: "2.0"
      - key: MIN_RISK_REWARD
        value: "2.0"
      - key: ATR_SL_MULTIPLIER
        value: "1.5"
      - key: ATR_TP1_MULTIPLIER
        value: "1.5"
      - key: ATR_TP2_MULTIPLIER
        value: "3.0"
      - key: ATR_TP3_MULTIPLIER
        value: "5.0"
      - key: API_HOST
        value: "0.0.0.0"
      - key: API_PORT
        value: "8000"
      - key: API_SECRET_KEY
        sync: false
      - key: API_WORKERS
        value: "1"
      - key: RATE_LIMIT_REQUESTS
        value: "60"
      - key: RATE_LIMIT_WINDOW_SECONDS
        value: "60"
      - key: LOG_LEVEL
        value: "INFO"
      - key: LOG_FILE
        value: "logs/nexara.log"
      - key: LOG_MAX_BYTES
        value: "10485760"
      - key: LOG_BACKUP_COUNT
        value: "5"
      - key: COINGECKO_API_URL
        value: "https://api.coingecko.com/api/v3"
      - key: ALTERNATIVE_ME_API_URL
        value: "https://api.alternative.me/fng/"
      - key: CRYPTO_NEWS_API_KEY
        sync: false
      - key: CRYPTO_NEWS_API_URL
        value: "https://cryptonews-api.com/api/v1"
      - key: ENVIRONMENT
        value: "production"
      - key: DEBUG
        value: "false"
    scaling:
      minInstances: 1
      maxInstances: 1
